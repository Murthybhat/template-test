name: Backburner Scaffold
run-name: backburner-${{ inputs.correlation_id }}

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        required: true
      parameters:
        required: true

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python + Copier
        run: pip install copier==9.3.1

      - name: Extract parameters
        id: params
        env:
          PARAMETERS: ${{ inputs.parameters }}
        run: |
          echo "$PARAMETERS" > /tmp/params.json
          echo "service_name=$(jq -r '.service_name' /tmp/params.json)" >> $GITHUB_OUTPUT
          echo "ecu_target=$(jq -r '.ecu_target' /tmp/params.json)" >> $GITHUB_OUTPUT
          echo "destination_repo=$(jq -r '.destination_repo' /tmp/params.json)" >> $GITHUB_OUTPUT
          echo "destination_org=$(jq -r '.destination_org' /tmp/params.json)" >> $GITHUB_OUTPUT

      - name: Run Copier
        run: |
          copier copy . /tmp/output \
            --data "service_name=${{ steps.params.outputs.service_name }}" \
            --data "ecu_target=${{ steps.params.outputs.ecu_target }}" \
            --defaults \
            --vcs-ref HEAD

      - name: Create destination repo and push
        env:
          GH_TOKEN: ${{ secrets.SCAFFOLD_PAT }}
        run: |
          gh repo create ${{ steps.params.outputs.destination_org }}/${{ steps.params.outputs.destination_repo }} \
            --private
          cd /tmp/output
          git init
          git add .
          git commit -m "chore: initial scaffold via backburner"
          git branch -M main
          git remote add origin \
            https://x-access-token:${GH_TOKEN}@github.com/${{ steps.params.outputs.destination_org }}/${{ steps.params.outputs.destination_repo }}.git
          git push -u origin main
